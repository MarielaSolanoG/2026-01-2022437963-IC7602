apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dns-interceptor-svc
  labels:
    app: dns-interceptor
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: dns-udp
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: UDP
  selector:
    app: dns-interceptor