apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui-svc
  labels:
    app: ui
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http-tcp
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app: ui
