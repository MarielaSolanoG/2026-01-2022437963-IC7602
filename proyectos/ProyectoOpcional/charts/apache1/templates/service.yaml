apiVersion: v1
kind: Service
metadata:
  name: {{ include "apache1.fullname" . }}
  namespace: {{ .Values.global.namespacePrivado }}
  labels:
    {{- include "apache1.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "apache1.selectorLabels" . | nindent 4 }}
