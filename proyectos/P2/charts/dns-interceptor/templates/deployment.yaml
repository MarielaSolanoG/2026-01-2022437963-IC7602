apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dns-interceptor
  labels:
    app: dns-interceptor
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: dns-interceptor
  template:
    metadata:
      labels:
        app: dns-interceptor
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: dns-udp
              containerPort: {{ .Values.service.targetPort }}
              protocol: UDP
          env:
            - name: DNS_PORT
              value: {{ .Values.env.dnsPort | quote }}
            
            - name: SUPABASE_URL
              value: {{ .Values.env.supabaseUrl | quote }}
            - name: SUPABASE_KEY
              value: {{ .Values.env.supabaseKey | quote }}
            
            - name: ZONAL_CACHE_LATAM_IP
              value: {{ .Values.env.zonalCacheLatamIp | quote }}
            - name: ZONAL_CACHE_USA_IP
              value: {{ .Values.env.zonalCacheUsaIp | quote }}
            - name: ZONAL_CACHE_EUROPE_IP
              value: {{ .Values.env.zonalCacheEuropeIp | quote }}