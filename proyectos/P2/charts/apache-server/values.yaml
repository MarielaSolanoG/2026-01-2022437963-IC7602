replicaCount: 1

image:
  repository: apache-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  name: apache-server-service
  type: ClusterIP
  port: 80
  targetPort: 80

container:
  port: 80

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"